  svg { display: block; }

  .legend { text-align: center; font-size: 0.78rem; color: #6b7a8d; margin-bottom: 20px; }
  .legend span { display: inline-block; margin: 0 10px; }
  .dot { display: inline-block; width: 12px; height: 4px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
  .dot-pk { background: #e8a020; }

<script>
let scale = 1;
const svg = document.getElementById('erd');

function zoomIn() { scale = Math.min(scale + 0.15, 2.5); svg.style.transform = `scale(${scale})`; svg.style.transformOrigin = 'top left'; }
function zoomOut() { scale = Math.max(scale - 0.15, 0.3); svg.style.transform = `scale(${scale})`; svg.style.transformOrigin = 'top left'; }
function resetZoom() { scale = 1; svg.style.transform = 'scale(1)'; }

function downloadSVG() {
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'limsacsdb_erd.svg'; a.click();
  URL.revokeObjectURL(url);
}

function downloadPNG() {
  const data = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const blob = new Blob([data], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = function() {
    const canvas = document.createElement('canvas');
    canvas.width = 1400; canvas.height = 1020;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f0f4f8'; ctx.fillRect(0, 0, 1400, 1020);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'limsacsdb_erd.png'; a.click();
  };
  img.src = url;
}
</script>
